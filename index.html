<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoolStudyHub Pro v2</title>
<style>
body { margin:0; font-family:'Segoe UI'; background:#0f0f0f; color:white; transition:0.3s; }
body.light { background:#f5f5f5; color:black; }
header { text-align:center; padding:20px; font-size:28px; color:#7a6cff; }
.container { max-width:900px; margin:auto; padding:20px; }
.card { background:#1a1a1a; padding:20px; border-radius:12px; margin-bottom:20px; box-shadow:0 0 10px rgba(122,108,255,0.2); }
body.light .card { background:#fff; color:#000; box-shadow:0 0 10px rgba(122,108,255,0.2); }
input { padding:10px; width:30%; border-radius:6px; border:none; margin:5px 0; }
button { padding:10px; margin:5px; border:none; border-radius:6px; background:#7a6cff; color:white; cursor:pointer; }
body.light button { color:white; }
li { display:flex; justify-content:space-between; align-items:center; background:#262626; margin-top:10px; padding:10px; border-radius:6px; }
body.light li { background:#e0e0e0; color:#000; }
.progress-bar { width:100%; height:20px; background:#333; border-radius:10px; overflow:hidden; margin-top:10px; }
.fill { height:100%; width:0%; background:linear-gradient(90deg,#7a6cff,#00c6ff); transition:0.3s; }
.status { margin-left:10px; }
@media(max-width:600px){
  input { width:100%; }
  li { flex-direction:column; align-items:flex-start; }
}
</style>
</head>
<body>
<header>CoolStudyHub Pro 🚀</header>
<div style="text-align:center;">
<button onclick="toggleMode()">🌙 / ☀ Mode</button>
</div>
<div class="container">
  <div class="card">
    <h2>🎯 Today's Focus</h2>
    <p id="date"></p>
  </div>

  <div class="card">
    <h2>📋 Study Planner</h2>
    <input id="task" placeholder="Task">
    <input id="subject" placeholder="Subject">
    <input id="time" placeholder="Hours">
    <button onclick="addTask()">Add</button>
    <ul id="list"></ul>
  </div>

  <div class="card">
    <h2>📊 Progress</h2>
    <div class="progress-bar"><div id="bar" class="fill"></div></div>
    <p id="percent">0%</p>
  </div>

  <div class="card">
    <h2>🧠 Analysis</h2>
    <p id="analysis"></p>
  </div>

  <div class="card">
    <h2>🔥 Streak</h2>
    <p id="streak">0 Days</p>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];
let streak = JSON.parse(localStorage.getItem("streak")) || 0;
let lastDate = localStorage.getItem("lastDate") || null;

function save(){
  localStorage.setItem("data", JSON.stringify(data));
  localStorage.setItem("streak", streak);
  localStorage.setItem("lastDate", lastDate);
}

function addTask(){
  let t = document.getElementById("task").value.trim();
  let s = document.getElementById("subject").value.trim();
  let time = document.getElementById("time").value.trim();
  if(!t||!s||!time) return alert("Task, Subject & Hours required!");
  data.push({t,s,time:Number(time),status:"pending"});
  document.getElementById("task").value='';
  document.getElementById("subject").value='';
  document.getElementById("time").value='';
  save(); render();
}

function completeTask(i){
  if(data[i].status==='done') return;
  data[i].status="done";
  updateStreak();
  save(); render();
}

function deleteTask(i){
  data.splice(i,1);
  save(); render();
}

function updateStreak(){
  let today = new Date().toDateString();
  if(lastDate!==today){
    streak++;
    lastDate=today;
  }
}

function render(){
  let list=document.getElementById("list");
  list.innerHTML="";
  let totalTime=0, completed=0, subjectMap={};

  data.forEach((d,i)=>{
    totalTime+=d.time;
    if(d.status==='done') completed++;
    subjectMap[d.s]=(subjectMap[d.s]||0)+d.time;

    let li=document.createElement("li");
    li.innerHTML=`
      <span style="text-decoration:${d.status==='done'?'line-through':'none'}">
        ${d.t} (${d.s} - ${d.time}h)
      </span>
      <div>
        <button onclick="completeTask(${i})" ${d.status==='done'?'disabled':''}>✔</button>
        <button onclick="deleteTask(${i})">❌</button>
        <span class='status'>${d.status}</span>
      </div>
    `;
    list.appendChild(li);
  });

  let percent = data.length? Math.round((completed/data.length)*100):0;
  document.getElementById("bar").style.width = percent + "%";
  document.getElementById("percent").innerText = percent + "%";

  // analysis
  let weak="", strong="";
  let entries=Object.entries(subjectMap);
  if(entries.length){
    entries.sort((a,b)=>a[1]-b[1]);
    weak=entries[0][0];
    strong=entries[entries.length-1][0];
  }
  let subjectPercent = entries.map(e=>`${e[0]}: ${Math.round(e[1]/totalTime*100)}%`).join(' | ');

  document.getElementById("analysis").innerText =
    `Total Study: ${totalTime} hrs | Weak: ${weak} | Strong: ${strong} | ${subjectPercent}`;

  document.getElementById("streak").innerText = streak + " Days";
}

function setDate(){
  document.getElementById("date").innerText = new Date().toDateString();
}

// Dark/Light mode toggle
function toggleMode(){
  document.body.classList.toggle("light");
}

setDate(); render();
</script>
</body>
</html>
